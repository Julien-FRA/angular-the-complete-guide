<app-header />
<main>
  <ul id="users">
    @for (user of users; track user.id) {
      <li>
        <app-user
          (select)="onSelectUser($event)"
          [user]="user"
        />
      </li>
    }
  </ul>

  @if (userSelected) {
    <app-tasks [user]="userSelected" [taskList]="userTasks" />
  } @else {
    <p id="fallback">Select user to see their tasks !</p>
  }
</main>
