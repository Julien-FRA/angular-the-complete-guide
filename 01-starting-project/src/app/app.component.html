<app-header />
<main>
  <ul id="users">
    @for (user of users; track $index) {
      <li>
        <app-user
          (select)="onSelectUser($event)"
          [user]="user"
        />
      </li>
    }
  </ul>

  @if (userNameSelected) {
    <app-tasks [userName]="userNameSelected" />
  }
</main>
