<section id="tasks">
  <header>
    <p>{{ user().name }}'s Tasks</p>
    <menu>
      <button (click)="onAddTask()">Add Task</button>
    </menu>
    @if (isAddingTask) {
      <app-add-task (isModalOpen)="onCloseModal($event)" />
    }
  </header>

  <ul>
    @for (task of taskList(); track task.id) {
      <li><app-task [task]="task" (complete)="onCompleteTask($event)"   /></li>
    }
  </ul>
</section>
