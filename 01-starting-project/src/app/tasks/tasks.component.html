@if (isAddingTask) {
  <app-add-task [userId]="user().id" (isModalOpen)="onCloseModal($event)" />
}

<section id="tasks">
  <header>
    <p>{{ user().name }}'s Tasks</p>
    <menu>
      <button (click)="onAddingTask()">Add Task</button>
    </menu>
  </header>

  <ul>
    @for (task of userTasks; track task.id) {
      <li><app-task [task]="task" /></li>
    }
  </ul>
</section>
